version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: outdoor_event_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── One-shot migration runner ─────────────────────────────────────────────────
  # Run with: docker compose run --rm migrate
  # Or on first start: docker compose up migrate
  migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/outdoor_event_hub
    command: >
      sh -c "npm install -g pnpm@10 &&
             pnpm install --frozen-lockfile &&
             npx tsx scripts/src/migrate.ts"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # ── API server + bundled frontend ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/outdoor_event_hub
      # Change SESSION_SECRET in production — never use this default value.
      SESSION_SECRET: change-me-in-production
      STATIC_DIR: /app/artifacts/event-hub/dist/public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
